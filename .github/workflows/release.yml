name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version: '1.24'

      - name: Build and bundle macOS app
        run: |
          go build -o PassIt ./cmd/passit
          mkdir -p PassIt.app/Contents/MacOS PassIt.app/Contents/Resources
          cp PassIt PassIt.app/Contents/MacOS/PassIt
          mkdir -p /tmp/passit.iconset
          cp assets/icon.png /tmp/passit.iconset/icon_32x32@2x.png
          iconutil -c icns /tmp/passit.iconset -o PassIt.app/Contents/Resources/icon.icns
          rm -rf /tmp/passit.iconset
          cp scripts/Info.plist PassIt.app/Contents/Info.plist

      - name: Archive
        run: zip -r PassIt-macOS-${{ github.ref_name }}.zip PassIt.app

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: macos
          path: PassIt-macOS-${{ github.ref_name }}.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version: '1.24'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Build Linux binary
        run: go build -o PassIt ./cmd/passit

      - name: Archive
        run: tar -czf PassIt-Linux-${{ github.ref_name }}.tar.gz PassIt

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: linux
          path: PassIt-Linux-${{ github.ref_name }}.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version: '1.24'

      - name: Build Windows exe
        run: go build -o PassIt.exe ./cmd/passit

      - name: Archive
        shell: pwsh
        run: Compress-Archive -Path PassIt.exe -DestinationPath PassIt-Windows-${{ github.ref_name }}.zip

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: windows
          path: PassIt-Windows-${{ github.ref_name }}.zip

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: artifacts/**/*
          generate_release_notes: true