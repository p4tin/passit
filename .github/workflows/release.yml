name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version: '1.24'

      - name: Build and bundle macOS app
        run: |
          go build -o PassIt ./cmd/passit
          mkdir -p PassIt.app/Contents/MacOS PassIt.app/Contents/Resources
          cp PassIt PassIt.app/Contents/MacOS/PassIt
          mkdir -p /tmp/passit.iconset
          cp assets/icon.png /tmp/passit.iconset/icon_32x32@2x.png
          iconutil -c icns /tmp/passit.iconset -o PassIt.app/Contents/Resources/icon.icns
          rm -rf /tmp/passit.iconset
          cp scripts/Info.plist PassIt.app/Contents/Info.plist

      - name: Code sign app
        run: codesign --force --deep --sign - PassIt.app

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -r PassIt.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "PassIt" -srcfolder dmg-staging -ov -format UDZO PassIt-macOS-${{ github.ref_name }}.dmg
          rm -rf dmg-staging

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: macos
          path: PassIt-macOS-${{ github.ref_name }}.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version: '1.24'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Build Linux binary
        run: go build -o PassIt ./cmd/passit

      - name: Archive
        run: tar -czf PassIt-Linux-${{ github.ref_name }}.tar.gz PassIt

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: linux
          path: PassIt-Linux-${{ github.ref_name }}.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version: '1.24'

      - name: Build Windows exe
        run: go build -ldflags "-H windowsgui" -o PassIt.exe ./cmd/passit

      - name: Install WiX
        run: dotnet tool install --global wix

      - name: Build MSI installer
        run: |
          wix build -o PassIt-Windows-${{ github.ref_name }}.msi scripts/PassIt.wxs -d PassItSourceDir="."

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: windows
          path: PassIt-Windows-${{ github.ref_name }}.msi

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: artifacts/**/*
          generate_release_notes: true

      - name: Update docs with latest version links
        run: |
          VERSION="${{ github.ref_name }}"
          sed -i "s|PassIt-macOS-v[0-9.]*\.dmg|PassIt-macOS-${VERSION}.dmg|g" docs/index.md
          sed -i "s|PassIt-Linux-v[0-9.]*\.tar\.gz|PassIt-Linux-${VERSION}.tar.gz|g" docs/index.md
          sed -i "s|PassIt-Windows-v[0-9.]*\.msi|PassIt-Windows-${VERSION}.msi|g" docs/index.md
          sed -i "s|/download/v[0-9.]*|/download/${VERSION}|g" docs/index.md

      - name: Commit docs update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/index.md
          git commit -m "docs: update download links for ${{ github.ref_name }}"
          git push